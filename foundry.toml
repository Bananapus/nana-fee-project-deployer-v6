[profile.default]
solc = '0.8.28'
evm_version = 'cancun'
via_ir = true
optimizer_runs = 200
libs = ["node_modules", "lib"]
remappings = ["@rev-net/core-v6/=../revnet-core-v6/"]
allow_paths = ["../revnet-core-v6"]
fs_permissions = [
  { access = "read-write", path = "./"},
  { access = "read", path = "../revnet-core-v6"}
]

[fuzz]
runs = 4096

[invariant]
runs = 1024
depth = 100
fail_on_revert = false

[rpc_endpoints]
ethereum = "${RPC_ETHEREUM_MAINNET}"

[fmt]
number_underscore = "thousands"
multiline_func_header = "all"
wrap_comments = true
